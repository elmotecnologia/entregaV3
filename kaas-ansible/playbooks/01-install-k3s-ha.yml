---
- name: Install common prerequisites on all nodes
  hosts: all
  gather_facts: yes
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install required packages
      package:
        name:
          - curl
          - wget
          - net-tools
          - jq
          - apt-transport-https
          - ca-certificates
        state: present

    - name: Disable swap
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Remove swap from fstab
      mount:
        name: swap
        fstype: swap
        state: absent

    - name: Load br_netfilter module
      modprobe:
        name: br_netfilter
        state: present

    - name: Configure sysctl
      sysctl:
        name: "{{ item }}"
        value: '1'
        state: present
        reload: yes
      loop:
        - net.bridge.bridge-nf-call-iptables
        - net.bridge.bridge-nf-call-ip6tables
        - net.ipv4.ip_forward

    - name: Set hostname
      hostname:
        name: "{{ hostname }}"
      when: hostname is defined

- name: Setup first master node
  hosts: masters[0]
  gather_facts: yes
  become: yes
  tasks:
    - name: Install K3s master (first node)
      shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION=v1.27.4+k3s1 \
        sh -s - server \
        --cluster-init \
        --disable servicelb \
        --disable traefik \
        --tls-san 10.10.50.61 \
        --tls-san 10.10.50.30 \
        --tls-san 10.10.50.31 \
        --tls-san 10.10.50.32 \
        --write-kubeconfig-mode 644

    - name: Get node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token

    - name: Save token to local file
      copy:
        content: "{{ node_token.content | b64decode }}"
        dest: /tmp/k3s_token
      delegate_to: localhost

    - name: Wait for K3s to be ready
      command: kubectl get nodes
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: result
      until: result.rc == 0
      retries: 30
      delay: 10

- name: Setup additional master nodes
  hosts: masters[1:]
  gather_facts: yes
  become: yes
  tasks:
    - name: Read token from local file
      slurp:
        src: /tmp/k3s_token
      register: token_content
      delegate_to: localhost

    - name: Set token fact
      set_fact:
        k3s_token: "{{ token_content.content | b64decode | trim }}"

    - name: Install K3s master (additional nodes)
      shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION=v1.27.4+k3s1 \
        K3S_URL=https://10.10.50.30:6443 \
        K3S_TOKEN={{ k3s_token }} \
        sh -s - server \
        --disable servicelb \
        --disable traefik \
        --tls-san 10.10.50.61 \
        --tls-san 10.10.50.30 \
        --tls-san 10.10.50.31 \
        --tls-san 10.10.50.32

- name: Setup worker nodes
  hosts: workers
  gather_facts: yes
  become: yes
  tasks:
    - name: Read token from local file
      slurp:
        src: /tmp/k3s_token
      register: token_content
      delegate_to: localhost

    - name: Set token fact
      set_fact:
        k3s_token: "{{ token_content.content | b64decode | trim }}"

    - name: Install K3s worker
      shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION=v1.27.4+k3s1 \
        K3S_URL=https://10.10.50.61:6443 \
        K3S_TOKEN={{ k3s_token }} \
        sh -s - agent

- name: Final verification
  hosts: masters[0]
  gather_facts: yes
  become: yes
  tasks:
    - name: Copy kubeconfig to local
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ./kubeconfig.yaml
        flat: yes

    - name: Update kubeconfig server to HAProxy
      lineinfile:
        path: ./kubeconfig.yaml
        regexp: '^    server: https://.*'
        line: '    server: https://10.10.50.61:6443'
      delegate_to: localhost

    - name: Show cluster nodes
      command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: nodes
      changed_when: false

    - name: Display nodes
      debug:
        msg: "{{ nodes.stdout_lines }}"

