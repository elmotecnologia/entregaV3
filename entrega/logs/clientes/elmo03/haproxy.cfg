
global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 4096
    user haproxy
    group haproxy

defaults
    log global
    mode tcp
    option tcplog
    retries 3
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend kubernetes-frontend
    bind *:6443
    mode tcp
    default_backend kubernetes-backend

backend kubernetes-backend
    mode tcp
    balance roundrobin
    option tcp-check
    server     server elmo03-cp-1 elmo03-cp-1\n    server elmo03-cp-2 elmo03-cp-2\n    server elmo03-cp-3 elmo03-cp-3\n:6443 check fall 3 rise 2

