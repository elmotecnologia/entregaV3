---
- name: Configurar HAProxy remotamente
  hosts: cliente1
  gather_facts: yes
  become: yes

  tasks:
    - name: Instalar HAProxy (caso não esteja)
      package:
        name: haproxy
        state: present

    - name: Fazer upload do template configurado
      template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        owner: root
        group: root
        mode: '0644'
      notify: reload haproxy

  handlers:
    - name: reload haproxy
      service:
        name: haproxy
        state: reloaded

